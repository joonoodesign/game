<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>가족 스도쿠 게임</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text-dark: #1e293b; --text-light: #64748b; }
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; background: var(--bg); margin: 0; padding: 10px; color: var(--text-dark); min-height: 100svh; overflow-y: auto; touch-action: manipulation; }
        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; padding-bottom: 20px; }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; }
        .screen.active { display: flex; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; color: white; background: var(--primary); cursor: pointer; margin-bottom: 8px; }
        .btn-secondary { background: #e2e8f0; color: var(--text-dark); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-exit { background: #64748b; color: white; margin-top: 10px; }
        select, input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(9, 1fr); border: 2px solid #334155; background: #334155; width: 100%; aspect-ratio: 1; gap: 1px; border-radius: 4px; overflow: hidden; }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; user-select: none; }
        .cell.fixed { background: #e2e8f0; font-weight: bold; }
        .cell.user-input { color: #2563eb; font-weight: bold; }
        .cell.selected { background: #bae6fd !important; }
        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; margin-top: 10px; }
        .numpad button { padding: 10px 0; font-size: 1.1rem; border: none; border-radius: 6px; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; }
        #leaderboard { display: none; width: 100%; background: #f1f5f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-size: 0.85rem; }
        .lb-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .lb-bar-bg { flex-grow: 1; background: #cbd5e1; height: 8px; border-radius: 4px; margin: 0 10px; }
        .lb-bar { background: var(--primary); height: 100%; width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div id="homeScreen" class="screen active">
            <div class="card">
                <h1>🧩 가족 스도쿠</h1>
                <button class="btn" onclick="navTo('singleSetupScreen')">👤 나홀로 게임</button>
                <button class="btn" style="background: #10b981;" onclick="navTo('multiSetupScreen')">👨‍👩‍👧‍👦 가족 초대하기</button>
            </div>
        </div>
        <div id="singleSetupScreen" class="screen">
            <div class="card">
                <h2>나홀로 설정</h2>
                <select id="singleDiff"><option value="30">초급</option><option value="45" selected>중급</option></select>
                <button class="btn" onclick="startSingleGame()">시작</button>
                <button class="btn btn-secondary" onclick="navTo('homeScreen')">뒤로</button>
            </div>
        </div>
        <div id="multiSetupScreen" class="screen">
            <div class="card">
                <h2>멀티플레이 로비</h2>
                <select id="playerName"><option value="아빠">아빠</option><option value="엄마">엄마</option><option value="채원">채원</option><option value="유빈">유빈</option><option value="준우">준우</option></select>
                <button class="btn" onclick="createRoom()">방 만들기</button>
                <input type="text" id="joinCode" placeholder="방 번호 4자리" maxlength="4">
                <button class="btn btn-secondary" onclick="joinRoom()">참가하기</button>
                <button class="btn btn-exit" onclick="navTo('homeScreen')">홈으로</button>
            </div>
        </div>
        <div id="waitingScreen" class="screen">
            <div class="card">
                <h2>초대 코드</h2>
                <div style="font-size: 2rem; font-weight: bold; color: var(--primary); text-align: center;" id="displayCode"></div>
                <div id="playerListContainer"></div>
                <button class="btn" id="btnHostStart" style="display:none; background:#ef4444;" onclick="startMultiGame()">🚀 시작</button>
                <button class="btn btn-exit" onclick="leaveRoom()">방 나가기</button>
            </div>
        </div>
        <div id="gameScreen" class="screen">
            <div id="leaderboard"><div id="lbPlayers"></div></div>
            <div class="game-header"><span id="timer">⏱️ 00:00</span></div>
            <div class="grid" id="grid"></div>
            <div class="numpad" id="numpad"></div>
            <button class="btn btn-danger" id="btnEndGame" style="display:none;" onclick="endMultiGame()">🛑 종료</button>
            <button class="btn btn-exit" onclick="leaveGame()">나가기</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iufyptoeqkcdajexmmew.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_NPllKEUc0xFurfTyzWiy8Q_7qxwaASD';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentMode='', roomId=null, myName='', isHost=false, myPlayerId=null, isPlaying=false;
        let solutionBoard=[], currentBoard=[], fixedCells=Array(81).fill(false), totalHoles=0, selectedCell=null;
        let timerInterval, secondsElapsed=0, myFinished=false;

        const basePattern = [[1,2,3,4,5,6,7,8,9],[4,5,6,7,8,9,1,2,3],[7,8,9,1,2,3,4,5,6],[2,3,1,5,6,4,8,9,7],[5,6,4,8,9,7,2,3,1],[8,9,7,2,3,1,5,6,4],[3,1,2,6,4,5,9,7,8],[6,4,5,9,7,8,3,1,2],[9,7,8,3,1,2,6,4,5]];

        function generateSudoku(holes) {
            let map = [1,2,3,4,5,6,7,8,9].sort(() => Math.random() - 0.5);
            let sol = basePattern.map(row => row.map(v => map[v-1]));
            let start = sol.map(row => [...row]);
            let count=0;
            while(count < holes) {
                let r = Math.floor(Math.random()*9), c = Math.floor(Math.random()*9);
                if(start[r][c] !== 0) { start[r][c] = 0; count++; }
            }
            return { sol, start, holes };
        }

        function navTo(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

        function startSingleGame() {
            currentMode = 'single';
            let holes = parseInt(document.getElementById('singleDiff').value);
            let data = generateSudoku(holes);
            setupBoard(data.sol, data.start, holes);
            document.getElementById('leaderboard').style.display = 'none';
            navTo('gameScreen'); startTimer();
        }

        async function createRoom() {
    try {
        currentMode = 'multi';
        myName = document.getElementById('playerName').value;
        roomId = Math.floor(1000 + Math.random() * 9000).toString();
        isHost = true;
        let holes = parseInt(document.getElementById('multiDiff').value);
        let boardData = generateSudoku(holes);

        // 1. 방 생성
        const { error: roomError } = await supabaseClient.from('rooms').insert([{ 
            id: roomId, host: myName, status: 'waiting', difficulty: holes, 
            solution: boardData.sol, start_board: boardData.start 
        }]);
        if (roomError) throw new Error("방 생성 실패: " + roomError.message);

        // 2. 플레이어 추가
        const { data, error: playerError } = await supabaseClient.from('players').insert([{ 
            room_id: roomId, name: myName, is_host: true 
        }]).select();
        if (playerError) throw new Error("플레이어 등록 실패: " + playerError.message);

        myPlayerId = data[0].id;
        setupWaitingRoom();

    } catch (err) {
        alert("모바일 에러 발생!: " + err.message);
        console.error(err);
    }
}

        async function joinRoom() {
            currentMode = 'multi'; myName = document.getElementById('playerName').value; roomId = document.getElementById('joinCode').value.trim();
            const { data: roomData } = await supabaseClient.from('rooms').select('*').eq('id', roomId).single();
            if(!roomData) return alert("방을 찾을 수 없습니다.");
            const { data } = await supabaseClient.from('players').insert([{ room_id:roomId, name:myName, is_host:false }]).select();
            myPlayerId = data[0].id;
            setupWaitingRoom();
        }

        function setupWaitingRoom() {
            document.getElementById('displayCode').innerText = roomId;
            document.getElementById('btnHostStart').style.display = isHost ? 'block' : 'none';
            navTo('waitingScreen');
            fetchPlayers();
        }

        async function fetchPlayers() {
            const { data } = await supabaseClient.from('players').select('*').eq('room_id', roomId);
            const container = document.getElementById('playerListContainer'); container.innerHTML = '';
            data.forEach(p => container.innerHTML += `<div class="player-item">👤 ${p.name} ${p.is_host?'👑':''}</div>`);
        }

        async function startMultiGame() { await supabaseClient.from('rooms').update({ status: 'playing' }).eq('id', roomId); }

        function setupBoard(sol, start, holes) {
            solutionBoard = sol; currentBoard = start.map(r => [...r]); totalHoles = holes; isPlaying = true; myFinished = false;
            const gridEl = document.getElementById('grid'); gridEl.innerHTML = '';
            fixedCells = Array(81).fill(false);
            for(let i=0; i<81; i++) {
                let r=Math.floor(i/9), c=i%9, cell = document.createElement('div');
                cell.className = 'cell';
                if(currentBoard[r][c]!==0) { cell.innerText=currentBoard[r][c]; cell.classList.add('fixed'); fixedCells[i]=true; }
                else { cell.onclick = () => { document.querySelectorAll('.cell').forEach(c=>c.classList.remove('selected')); cell.classList.add('selected'); selectedCell=cell; selectedCell.dataset.r=r; selectedCell.dataset.c=c; }; }
                gridEl.appendChild(cell);
            }
        }

        function startTimer() {
            clearInterval(timerInterval); secondsElapsed=0;
            timerInterval = setInterval(() => {
                secondsElapsed++;
                let m = Math.floor(secondsElapsed/60), s = secondsElapsed%60;
                document.getElementById('timer').innerText = `⏱️ ${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
        }

        function inputNum(n) {
            if(selectedCell && isPlaying && !myFinished) {
                selectedCell.innerText = n; selectedCell.classList.add('user-input');
                let r = selectedCell.dataset.r, c = selectedCell.dataset.c;
                if(parseInt(selectedCell.innerText) === solutionBoard[r][c]) verifyProgress();
            }
        }

        function verifyProgress() {
            let correct = 0;
            document.querySelectorAll('.cell').forEach((c,i)=>{ if(!fixedCells[i] && c.innerText !== "" && parseInt(c.innerText) === solutionBoard[Math.floor(i/9)][i%9]) correct++; });
            let percent = Math.floor((correct/totalHoles)*100);
            if(percent >= 100 && !myFinished) {
                myFinished = true;
                if(currentMode==='single') { isPlaying=false; clearInterval(timerInterval); alert("🎉 클리어!"); }
                else { supabaseClient.from('players').update({ progress: 100 }).eq('id', myPlayerId); }
            } else if(currentMode==='multi') { supabaseClient.from('players').update({ progress: percent }).eq('id', myPlayerId); }
        }

        const np = document.getElementById('numpad');
        for(let i=1; i<=9; i++) { let b = document.createElement('button'); b.innerText = i; b.onclick = () => inputNum(i); np.appendChild(b); }
        let cb = document.createElement('button'); cb.innerText = '지우기'; cb.className='action'; cb.onclick = () => { if(selectedCell) selectedCell.innerText=''; }; np.appendChild(cb);

        function leaveGame() { location.reload(); }
    </script>
</body>
</html>
